version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cam_postgres
    environment:
      POSTGRES_USER: cam_user
      POSTGRES_PASSWORD: cam_password
      POSTGRES_DB: cam_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cam_user -d cam_db']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: cam_postgres_test
    environment:
      POSTGRES_USER: cam_user
      POSTGRES_PASSWORD: cam_password
      POSTGRES_DB: cam_test_db
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cam_user -d cam_test_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
