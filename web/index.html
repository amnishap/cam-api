<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAM — Card &amp; Account Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:    #1e3a5f;
      --brand-lt: #2d5f8f;
      --accent:   #e8a020;
      --green:    #2d8a4e;
      --red:      #c0392b;
      --orange:   #d35400;
      --grey:     #7f8c8d;
      --bg:       #f0f4f8;
      --card-bg:  #ffffff;
      --border:   #dce3ea;
      --text:     #1a2332;
      --text-lt:  #5a6a7a;
      --radius:   12px;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-lt) 100%);
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }

    nav { display: flex; gap: .5rem; }
    nav button {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.4);
      color: #fff;
      padding: .45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .875rem;
      transition: background .15s, border-color .15s;
    }
    nav button:hover, nav button.active {
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.8);
    }

    /* ─── Layout ─── */
    main { max-width: 900px; margin: 2.5rem auto; padding: 0 1.5rem; }

    .page { display: none; }
    .page.active { display: block; }

    /* ─── Panel ─── */
    .panel {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .panel h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--brand); }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .panel-header h2 { margin-bottom: 0; }

    /* ─── Form ─── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .8rem; font-weight: 600; color: var(--text-lt); text-transform: uppercase; letter-spacing: .4px; }
    input, select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .95rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
      width: 100%;
    }
    input:focus, select:focus { outline: none; border-color: var(--brand-lt); }

    /* ─── Card type selector ─── */
    .type-selector { display: flex; gap: .75rem; }
    .type-option {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: .9rem;
      cursor: pointer;
      text-align: center;
      transition: border-color .15s, background .15s;
    }
    .type-option:hover { border-color: var(--brand-lt); }
    .type-option.selected { border-color: var(--brand); background: #eef4fc; }
    .type-option input[type=radio] { display: none; }
    .type-option .icon { font-size: 1.6rem; display: block; margin-bottom: .3rem; }
    .type-option .label { font-size: .85rem; font-weight: 600; }
    .type-option .sub { font-size: .75rem; color: var(--text-lt); margin-top: .15rem; }

    /* ─── Shipping section ─── */
    #shippingSection {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1.5px solid var(--border);
    }
    #shippingSection.visible { display: block; }
    #shippingSection h3 { font-size: .9rem; font-weight: 700; color: var(--text-lt); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .4px; }

    /* ─── Button ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-accent  { background: var(--accent); color: #fff; }
    .btn-outline { background: #fff; color: var(--brand); border: 1.5px solid var(--brand); }
    .btn-sm { padding: .4rem .85rem; font-size: .8rem; }
    .btn-lock   { background: #fff3e0; color: #b45309; border: 1.5px solid #fbbf24; }
    .btn-unlock { background: #ecfdf5; color: #065f46; border: 1.5px solid #34d399; }
    .btn-danger { background: #fff; color: var(--red); border: 1.5px solid var(--red); }
    .btn-save   { background: var(--green); color: #fff; }
    .btn-limits { background: #f0f4ff; color: var(--brand); border: 1.5px solid #c7d3f5; }

    .form-actions { margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: .75rem; }

    /* ─── Alerts ─── */
    .alert {
      border-radius: 8px;
      padding: .85rem 1rem;
      margin-top: 1rem;
      font-size: .9rem;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-error   { background: #fef2f2; color: #991b1b; border: 1.5px solid #fca5a5; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1.5px solid #86efac; }
    .alert-info    { background: #eff6ff; color: #1e40af; border: 1.5px solid #93c5fd; }

    /* ─── Success card ─── */
    .success-card {
      background: linear-gradient(135deg, var(--brand) 0%, #1a4a7a 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 2rem;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }
    .success-card::before {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }
    .success-card::after {
      content: '';
      position: absolute;
      right: 40px; bottom: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
    }
    .success-card h3 { font-size: 1rem; opacity: .7; margin-bottom: 1rem; }
    .success-card .pan { font-size: 1.4rem; font-family: monospace; letter-spacing: 3px; margin-bottom: 1rem; }
    .success-card .meta { display: flex; gap: 2rem; flex-wrap: wrap; }
    .success-card .meta-item span { display: block; }
    .success-card .meta-item .key { font-size: .7rem; opacity: .65; text-transform: uppercase; letter-spacing: .5px; }
    .success-card .meta-item .val { font-size: .95rem; font-weight: 600; margin-top: .15rem; }
    .success-card .chip { display: inline-flex; align-items: center; gap: .3rem; background: rgba(255,255,255,.15); border-radius: 6px; padding: .25rem .6rem; font-size: .75rem; font-weight: 600; margin-top: .75rem; }

    /* ─── Card tiles ─── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1rem; }

    .card-tile {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative;
      transition: box-shadow .15s;
    }
    .card-tile:hover { box-shadow: var(--shadow); }
    .card-tile.locked { border-color: #fbbf24; background: #fffbeb; }

    .card-tile .tile-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .75rem; }
    .card-tile .network { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-lt); }
    .card-tile .type-badge {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      padding: .2rem .5rem; border-radius: 5px; letter-spacing: .5px;
    }
    .type-badge.virtual  { background: #dbeafe; color: #1d4ed8; }
    .type-badge.physical { background: #fce7f3; color: #9d174d; }

    .card-tile .masked-pan { font-family: monospace; font-size: 1.05rem; letter-spacing: 2px; margin: .5rem 0; color: var(--text); }
    .card-tile .expiry { font-size: .8rem; color: var(--text-lt); margin-bottom: .75rem; }

    .status-row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .badge {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: .2rem .55rem; border-radius: 5px;
    }
    .badge-active     { background: #dcfce7; color: #166534; }
    .badge-pending    { background: #fef9c3; color: #854d0e; }
    .badge-inactive   { background: #f1f5f9; color: #64748b; }
    .badge-suspended  { background: #ffedd5; color: #9a3412; }
    .badge-closed     { background: #fee2e2; color: #991b1b; }
    .badge-locked     { background: #fef3c7; color: #92400e; }
    .badge-unlocked   { background: #ecfdf5; color: #065f46; }

    .tile-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ─── Limits drawer on card tile ─── */
    .limits-drawer {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1.5px solid var(--border);
      display: none;
    }
    .limits-drawer.open { display: block; }
    .limits-drawer h4 {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .4px; color: var(--text-lt); margin-bottom: .75rem;
    }

    .limit-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .6rem;
    }
    .limit-row label {
      font-size: .75rem;
      min-width: 110px;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text);
      font-weight: 500;
    }
    .limit-row input {
      flex: 1;
      padding: .4rem .6rem;
      font-size: .85rem;
      border-radius: 6px;
    }
    .limit-row .limit-unit {
      font-size: .75rem;
      color: var(--text-lt);
      min-width: 28px;
    }

    .limit-highlight {
      background: linear-gradient(135deg, #fef9c3 0%, #fef3c7 100%);
      border: 1.5px solid #fbbf24;
      border-radius: 8px;
      padding: .6rem .75rem;
      margin-bottom: .75rem;
    }
    .limit-highlight .highlight-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #92400e;
      margin-bottom: .5rem;
    }

    .drawer-actions {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
      align-items: center;
    }
    .drawer-alert {
      font-size: .78rem;
      border-radius: 6px;
      padding: .35rem .6rem;
      display: none;
      flex: 1;
    }
    .drawer-alert.visible { display: block; }
    .drawer-alert.success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
    .drawer-alert.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ─── Account limits panel ─── */
    .acct-limits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 600px) { .acct-limits-grid { grid-template-columns: 1fr; } }

    .acct-limit-card {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .acct-limit-card .alc-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text-lt);
      margin-bottom: .5rem;
    }
    .acct-limit-card.monthly-card {
      border-color: #fbbf24;
      background: linear-gradient(135deg, #fffbeb 0%, #fef9c3 100%);
    }
    .acct-limit-card.monthly-card .alc-title { color: #92400e; }

    .acct-limit-card input {
      font-size: .9rem;
      padding: .45rem .65rem;
    }
    .acct-limit-card .alc-hint {
      font-size: .7rem;
      color: var(--text-lt);
      margin-top: .3rem;
    }

    /* ─── MCC block controls ─── */
    .mcc-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1.5px solid var(--border);
    }
    .mcc-section-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text-lt);
      margin-bottom: .6rem;
    }
    .mcc-add-row {
      display: flex;
      gap: .5rem;
      align-items: center;
      margin-bottom: .6rem;
    }
    .mcc-add-row input {
      width: 80px;
      padding: .38rem .55rem;
      font-size: .85rem;
      border-radius: 6px;
      font-family: monospace;
      letter-spacing: 1px;
    }
    .btn-block { background: #fff0f0; color: #991b1b; border: 1.5px solid #fca5a5; }
    .mcc-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .5rem; min-height: 1.5rem; }
    .mcc-tag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 5px;
      padding: .2rem .45rem;
      font-size: .75rem;
      font-weight: 600;
      font-family: monospace;
    }
    .mcc-tag button {
      background: none;
      border: none;
      color: #991b1b;
      cursor: pointer;
      font-size: .8rem;
      line-height: 1;
      padding: 0;
      opacity: .7;
    }
    .mcc-tag button:hover { opacity: 1; }
    .mcc-presets {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-top: .4rem;
    }
    .mcc-preset {
      font-size: .7rem;
      padding: .2rem .5rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      cursor: pointer;
      transition: background .12s;
    }
    .mcc-preset:hover { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }

    /* ─── Lookup ─── */
    .lookup-row { display: flex; gap: .75rem; align-items: flex-end; }
    .lookup-row .form-group { flex: 1; }

    /* ─── Spinner ─── */
    .spin { display: inline-block; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Empty state ─── */
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-lt); }
    .empty .icon { font-size: 2.5rem; margin-bottom: .75rem; }

    /* ─── Steps ─── */
    .steps { display: flex; gap: 0; margin-bottom: 2rem; }
    .step { flex: 1; text-align: center; position: relative; }
    .step::after { content: ''; position: absolute; top: 14px; left: 50%; width: 100%; height: 2px; background: var(--border); z-index: 0; }
    .step:last-child::after { display: none; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border); color: var(--text-lt);
      font-size: .8rem; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .step.done .step-dot  { background: var(--green); color: #fff; }
    .step.active .step-dot { background: var(--brand); color: #fff; }
    .step-label { font-size: .7rem; color: var(--text-lt); margin-top: .35rem; }
    .step.active .step-label { color: var(--brand); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>CAM <span>|</span> Card &amp; Account Management</h1>
  <nav>
    <button class="active" onclick="showPage('apply', this)">Apply for a Card</button>
    <button onclick="showPage('manage', this)">Manage Cards</button>
  </nav>
</header>

<main>

  <!-- ══════════════ APPLY PAGE ══════════════ -->
  <div id="page-apply" class="page active">

    <div class="panel">
      <h2>Apply for a Credit Card</h2>

      <!-- Progress steps -->
      <div class="steps" id="applySteps">
        <div class="step active" id="step1"><div class="step-dot">1</div><div class="step-label">Your Info</div></div>
        <div class="step" id="step2"><div class="step-dot">2</div><div class="step-label">Address</div></div>
        <div class="step" id="step3"><div class="step-dot">3</div><div class="step-label">Card Type</div></div>
        <div class="step" id="step4"><div class="step-dot">4</div><div class="step-label">Done</div></div>
      </div>

      <form id="applyForm" novalidate>

        <!-- Step 1: Personal -->
        <div id="applyStep1">
          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">First Name *</label>
              <input id="firstName" type="text" placeholder="Jane" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name *</label>
              <input id="lastName" type="text" placeholder="Doe" required />
            </div>
            <div class="form-group">
              <label for="email">Email Address *</label>
              <input id="email" type="email" placeholder="jane@example.com" required />
            </div>
            <div class="form-group">
              <label for="dob">Date of Birth</label>
              <input id="dob" type="date" />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input id="phone" type="tel" placeholder="+1 555 000 0000" />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-primary" onclick="applyNext(2)">Continue →</button>
          </div>
        </div>

        <!-- Step 2: Address -->
        <div id="applyStep2" style="display:none">
          <div class="form-grid">
            <div class="form-group full">
              <label for="addressLine1">Address Line 1</label>
              <input id="addressLine1" type="text" placeholder="123 Main St" />
            </div>
            <div class="form-group full">
              <label for="addressLine2">Address Line 2</label>
              <input id="addressLine2" type="text" placeholder="Apt 4B" />
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input id="city" type="text" placeholder="New York" />
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <input id="state" type="text" placeholder="NY" maxlength="2" />
            </div>
            <div class="form-group">
              <label for="postalCode">Postal Code</label>
              <input id="postalCode" type="text" placeholder="10001" />
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <input id="country" type="text" value="US" maxlength="2" />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="applyNext(1)">← Back</button>
            <button type="button" class="btn btn-primary" onclick="applyNext(3)">Continue →</button>
          </div>
        </div>

        <!-- Step 3: Card Type -->
        <div id="applyStep3" style="display:none">
          <div class="form-group full" style="margin-bottom:1.25rem">
            <label>Card Type *</label>
            <div class="type-selector">
              <label class="type-option selected" onclick="selectCardType('VIRTUAL', this)">
                <input type="radio" name="cardType" value="VIRTUAL" checked />
                <span class="icon">💳</span>
                <div class="label">Virtual Card</div>
                <div class="sub">Instant · Online use</div>
              </label>
              <label class="type-option" onclick="selectCardType('PHYSICAL', this)">
                <input type="radio" name="cardType" value="PHYSICAL" />
                <span class="icon">📦</span>
                <div class="label">Physical Card</div>
                <div class="sub">Delivered in 5–7 days</div>
              </label>
            </div>
          </div>

          <div id="shippingSection">
            <h3>Shipping Address</h3>
            <div class="form-grid">
              <div class="form-group full">
                <label for="shipLine1">Address Line 1 *</label>
                <input id="shipLine1" type="text" placeholder="123 Main St" />
              </div>
              <div class="form-group">
                <label for="shipCity">City *</label>
                <input id="shipCity" type="text" placeholder="New York" />
              </div>
              <div class="form-group">
                <label for="shipState">State *</label>
                <input id="shipState" type="text" placeholder="NY" maxlength="2" />
              </div>
              <div class="form-group">
                <label for="shipPostal">Postal Code *</label>
                <input id="shipPostal" type="text" placeholder="10001" />
              </div>
              <div class="form-group">
                <label for="shipCountry">Country</label>
                <input id="shipCountry" type="text" value="US" maxlength="2" />
              </div>
            </div>
          </div>

          <div id="applyAlert" class="alert"></div>

          <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="applyNext(2)">← Back</button>
            <button type="submit" class="btn btn-accent" id="submitBtn">
              Submit Application
            </button>
          </div>
        </div>

        <!-- Step 4: Success -->
        <div id="applyStep4" style="display:none">
          <div id="applySuccess"></div>
          <div class="form-actions" style="justify-content:center; margin-top:1.5rem">
            <button type="button" class="btn btn-outline" onclick="showPage('manage', document.querySelector('nav button:last-child'))">
              Manage My Cards →
            </button>
            <button type="button" class="btn btn-primary" onclick="resetApplyForm()">Apply for Another</button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- ══════════════ MANAGE PAGE ══════════════ -->
  <div id="page-manage" class="page">

    <!-- Lookup -->
    <div class="panel">
      <h2>My Cards</h2>

      <div class="lookup-row">
        <div class="form-group">
          <label for="accountIdInput">Account ID</label>
          <input id="accountIdInput" type="text" placeholder="Paste your account UUID…" />
        </div>
        <button class="btn btn-primary" onclick="loadCards()" id="loadBtn">Load Cards</button>
      </div>

      <div id="manageAlert" class="alert" style="margin-top:.75rem"></div>
    </div>

    <!-- Account-level spending limits (rendered dynamically) -->
    <div id="accountLimitsContainer"></div>

    <!-- Cards grid (rendered dynamically) -->
    <div id="cardsContainer"></div>

  </div>

</main>

<script>
  /* ════════════════════════════════════════
     Config
  ═════════════════════════════════════════ */
  const API_BASE = 'http://localhost:3000/api/v1';
  const API_KEY  = 'cam-dev-secret-key-1234';

  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`,
        ...(options.headers ?? {}),
      },
    });
    const data = await res.json();
    if (!res.ok) {
      const msg = data?.error?.message ?? `HTTP ${res.status}`;
      throw Object.assign(new Error(msg), { code: data?.error?.code, status: res.status });
    }
    return data;
  }

  /* ════════════════════════════════════════
     Helpers — cents ↔ dollars
  ═════════════════════════════════════════ */
  const toDollars = cents => cents == null ? '' : (cents / 100).toFixed(2);
  const toCents   = dollars => {
    const n = parseFloat(dollars);
    return isNaN(n) || dollars === '' ? null : Math.round(n * 100);
  };
  const fmtDollars = cents => cents == null ? '—' : `$${(cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;

  /* ════════════════════════════════════════
     MCC state & helpers
  ═════════════════════════════════════════ */
  /* Common MCC codes for quick-block presets */
  const MCC_PRESETS = [
    { code: '7995', label: '🎰 Gambling' },
    { code: '5812', label: '🍽 Restaurants' },
    { code: '5411', label: '🛒 Groceries' },
    { code: '5541', label: '⛽ Gas Stations' },
    { code: '5912', label: '💊 Pharmacies' },
    { code: '5944', label: '💎 Jewelry' },
    { code: '7011', label: '🏨 Hotels' },
    { code: '5999', label: '🛍 Misc Retail' },
  ];

  /* account-level blocked MCCs — Set of 4-digit strings */
  let acctMccBlocks = new Set();

  /* per-card blocked MCCs — Map<cardId, Set<string>> */
  const cardMccBlocksMap = {};

  function mccSectionHTML(nsPrefix, blocks) {
    const presetBtns = MCC_PRESETS.map(p =>
      `<button type="button" class="mcc-preset" onclick="addMcc('${nsPrefix}','${p.code}')">${p.label} <span style="opacity:.6;font-family:monospace">${p.code}</span></button>`
    ).join('');

    const tags = [...blocks].map(code =>
      `<span class="mcc-tag">${code}<button type="button" onclick="removeMcc('${nsPrefix}','${code}')" title="Remove">✕</button></span>`
    ).join('');

    return `
      <div class="mcc-section">
        <div class="mcc-section-title">🚫 MCC Block List</div>
        <div class="mcc-tags" id="mcc-tags-${nsPrefix}">${tags || '<span style="font-size:.75rem;color:var(--text-lt)">No codes blocked</span>'}</div>
        <div class="mcc-add-row">
          <input id="mcc-input-${nsPrefix}" type="text" maxlength="4" placeholder="0000"
            oninput="this.value=this.value.replace(/\\D/g,'')"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addMcc('${nsPrefix}')}" />
          <button type="button" class="btn btn-sm btn-block" onclick="addMcc('${nsPrefix}')">+ Block MCC</button>
        </div>
        <div class="mcc-presets">${presetBtns}</div>
      </div>`;
  }

  function addMcc(nsPrefix, code) {
    const input = document.getElementById(`mcc-input-${nsPrefix}`);
    const val   = (code ?? input.value).trim().padStart(4, '0');
    if (!/^\d{4}$/.test(val)) { input.focus(); return; }

    const set = nsPrefix === 'acct' ? acctMccBlocks : (cardMccBlocksMap[nsPrefix] ??= new Set());
    set.add(val);
    if (!code) input.value = '';
    refreshMccTags(nsPrefix, set);
  }

  function removeMcc(nsPrefix, code) {
    const set = nsPrefix === 'acct' ? acctMccBlocks : cardMccBlocksMap[nsPrefix];
    if (set) { set.delete(code); refreshMccTags(nsPrefix, set); }
  }

  function refreshMccTags(nsPrefix, set) {
    const el = document.getElementById(`mcc-tags-${nsPrefix}`);
    if (!el) return;
    el.innerHTML = [...set].map(code =>
      `<span class="mcc-tag">${code}<button type="button" onclick="removeMcc('${nsPrefix}','${code}')" title="Remove">✕</button></span>`
    ).join('') || '<span style="font-size:.75rem;color:var(--text-lt)">No codes blocked</span>';
  }

  /* ════════════════════════════════════════
     Page routing
  ═════════════════════════════════════════ */
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    btn.classList.add('active');
    if (name === 'manage') autoLoadCards();
  }

  /* ════════════════════════════════════════
     Apply form — multi-step
  ═════════════════════════════════════════ */
  let currentStep = 1;
  let selectedCardType = 'VIRTUAL';

  function applyNext(step) {
    if (step > currentStep && !validateStep(currentStep)) return;
    document.getElementById(`applyStep${currentStep}`).style.display = 'none';
    document.getElementById(`applyStep${step}`).style.display = 'block';

    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById(`step${i}`);
      el.classList.remove('active', 'done');
      if (i < step) el.classList.add('done');
      if (i === step) el.classList.add('active');
    }
    document.querySelectorAll('.step.done .step-dot').forEach(d => { if (!d.textContent.includes('✓')) d.textContent = '✓'; });
    currentStep = step;
  }

  function validateStep(step) {
    if (step === 1) {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const em = document.getElementById('email').value.trim();
      if (!fn || !ln) { showAlert('applyAlert', 'First and last name are required.', 'error'); return false; }
      if (!em || !em.includes('@')) { showAlert('applyAlert', 'A valid email address is required.', 'error'); return false; }
    }
    if (step === 3 && selectedCardType === 'PHYSICAL') {
      if (!document.getElementById('shipLine1').value.trim() ||
          !document.getElementById('shipCity').value.trim() ||
          !document.getElementById('shipState').value.trim() ||
          !document.getElementById('shipPostal').value.trim()) {
        showAlert('applyAlert', 'Shipping address is required for a physical card.', 'error');
        return false;
      }
    }
    return true;
  }

  function selectCardType(type, label) {
    selectedCardType = type;
    document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
    label.classList.add('selected');
    const ship = document.getElementById('shippingSection');
    if (type === 'PHYSICAL') ship.classList.add('visible');
    else ship.classList.remove('visible');
  }

  function resetApplyForm() {
    document.getElementById('applyForm').reset();
    selectedCardType = 'VIRTUAL';
    document.querySelectorAll('.type-option').forEach((o, i) => {
      o.classList.toggle('selected', i === 0);
    });
    document.getElementById('shippingSection').classList.remove('visible');
    applyNext(1);
  }

  /* ─── Submit ─── */
  document.getElementById('applyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validateStep(3)) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin">⟳</span> Processing…';
    clearAlert('applyAlert');

    try {
      const firstName    = document.getElementById('firstName').value.trim();
      const lastName     = document.getElementById('lastName').value.trim();
      const email        = document.getElementById('email').value.trim();
      const dob          = document.getElementById('dob').value;
      const phone        = document.getElementById('phone').value.trim();
      const addressLine1 = document.getElementById('addressLine1').value.trim();
      const addressLine2 = document.getElementById('addressLine2').value.trim();
      const city         = document.getElementById('city').value.trim();
      const state        = document.getElementById('state').value.trim();
      const postalCode   = document.getElementById('postalCode').value.trim();
      const country      = (document.getElementById('country').value.trim() || 'US').toUpperCase().slice(0,2);

      /* Step 1: Create account */
      const accountBody = {
        externalRef: `APP-${email}`,
        firstName, lastName, email,
        creditLimitCents: 500000,
        currency: 'USD',
        ...(phone        && { phone }),
        ...(dob          && { dateOfBirth: dob }),
        ...(addressLine1 && { addressLine1 }),
        ...(addressLine2 && { addressLine2 }),
        ...(city         && { city }),
        ...(state        && { state }),
        ...(postalCode   && { postalCode }),
        ...(country      && { country }),
      };

      let account;
      try {
        account = await apiFetch('/accounts', { method: 'POST', body: JSON.stringify(accountBody) });
      } catch (err) {
        if (err.status === 409) {
          showAlert('applyAlert', 'An account with this email already exists. Go to "Manage Cards" to view your cards.', 'error');
          btn.disabled = false;
          btn.textContent = 'Submit Application';
          return;
        }
        throw err;
      }

      /* Step 2: Verify KYC */
      await apiFetch(`/accounts/${account.id}/kyc`, {
        method: 'PATCH',
        body: JSON.stringify({ kycStatus: 'VERIFIED' }),
      });

      /* Step 3: Activate account */
      await apiFetch(`/accounts/${account.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'ACTIVE' }),
      });

      /* Step 4: Create card */
      const cardBody = {
        type: selectedCardType,
        cardholderName: `${firstName} ${lastName}`,
        ...(selectedCardType === 'PHYSICAL' && {
          shippingAddress: {
            line1:      document.getElementById('shipLine1').value.trim(),
            city:       document.getElementById('shipCity').value.trim(),
            state:      document.getElementById('shipState').value.trim(),
            postalCode: document.getElementById('shipPostal').value.trim(),
            country:    (document.getElementById('shipCountry').value.trim() || 'US').toUpperCase().slice(0,2),
          },
        }),
      };
      const card = await apiFetch(`/accounts/${account.id}/cards`, {
        method: 'POST',
        body: JSON.stringify(cardBody),
      });

      /* Save to localStorage */
      localStorage.setItem('cam_accountId', account.id);
      localStorage.setItem('cam_accountEmail', email);

      /* Show success card */
      renderSuccessCard(card, account);
      applyNext(4);

    } catch (err) {
      showAlert('applyAlert', err.message || 'Something went wrong. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Application';
    }
  });

  function renderSuccessCard(card, account) {
    const lockBadge    = card.isLocked ? '🔒 Locked' : '🔓 Unlocked';
    const statusClass  = card.status === 'ACTIVE' ? '✅ Active' : '⏳ Pending Activation';
    document.getElementById('applySuccess').innerHTML = `
      <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;color:#166534;font-weight:600;">
        🎉 Your application was approved! Your card is ready.
      </div>
      <div class="success-card">
        <h3>${card.type === 'VIRTUAL' ? 'Virtual Credit Card' : 'Physical Credit Card'}</h3>
        <div class="pan">${card.maskedPan}</div>
        <div class="meta">
          <div class="meta-item">
            <span class="key">Cardholder</span>
            <span class="val">${card.cardholderName}</span>
          </div>
          <div class="meta-item">
            <span class="key">Expires</span>
            <span class="val">${String(card.expiryMonth).padStart(2,'0')} / ${card.expiryYear}</span>
          </div>
          <div class="meta-item">
            <span class="key">Network</span>
            <span class="val">${card.network}</span>
          </div>
          <div class="meta-item">
            <span class="key">Credit Limit</span>
            <span class="val">$5,000.00</span>
          </div>
        </div>
        <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
          <span class="chip">${statusClass}</span>
          <span class="chip">${lockBadge}</span>
        </div>
      </div>
      <div style="margin-top:.75rem;font-size:.8rem;color:var(--text-lt)">
        Account ID: <code style="background:#f1f5f9;padding:.15rem .4rem;border-radius:4px">${account.id}</code>
      </div>
    `;
  }

  /* ════════════════════════════════════════
     Manage Cards
  ═════════════════════════════════════════ */
  function autoLoadCards() {
    const stored = localStorage.getItem('cam_accountId');
    if (stored) {
      document.getElementById('accountIdInput').value = stored;
      loadCards();
    }
  }

  async function loadCards() {
    const accountId = document.getElementById('accountIdInput').value.trim();
    if (!accountId) { showAlert('manageAlert', 'Please enter an Account ID.', 'error'); return; }

    const btn = document.getElementById('loadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin">⟳</span>';
    clearAlert('manageAlert');

    try {
      const [cardsResult, limitsResult] = await Promise.all([
        apiFetch(`/accounts/${accountId}/cards`),
        apiFetch(`/accounts/${accountId}/limits`).catch(() => ({ data: [] })),
      ]);

      const cards  = cardsResult.data ?? [];
      const limits = limitsResult.data ?? [];
      localStorage.setItem('cam_accountId', accountId);

      renderAccountLimitsPanel(accountId, limits);
      renderCardTiles(cards, accountId);
    } catch (err) {
      showAlert('manageAlert', err.message, 'error');
      document.getElementById('cardsContainer').innerHTML = '';
      document.getElementById('accountLimitsContainer').innerHTML = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load Cards';
    }
  }

  /* ════════════════════════════════════════
     Account Limits Panel
  ═════════════════════════════════════════ */
  function renderAccountLimitsPanel(accountId, limits) {
    const byType = {};
    acctMccBlocks = new Set();
    (limits || []).forEach(l => {
      if (l.limitType === 'MCC_BLOCK' && l.mccCode) acctMccBlocks.add(l.mccCode);
      else byType[l.limitType] = l.valueCents;
    });

    const daily  = toDollars(byType['DAILY']);
    const monthly= toDollars(byType['MONTHLY']);
    const txn    = toDollars(byType['PER_TRANSACTION']);

    document.getElementById('accountLimitsContainer').innerHTML = `
      <div class="panel">
        <div class="panel-header">
          <h2>Account Spending Limits</h2>
          <span style="font-size:.78rem;color:var(--text-lt)">Applies to all cards on this account</span>
        </div>

        <div class="acct-limits-grid">
          <div class="acct-limit-card monthly-card">
            <div class="alc-title">📅 Monthly Spend Cap</div>
            <input id="acct-limit-monthly" type="number" min="0" step="0.01"
              placeholder="No limit" value="${monthly}" />
            <div class="alc-hint">Total spend allowed per calendar month</div>
          </div>
          <div class="acct-limit-card">
            <div class="alc-title">📆 Daily Limit</div>
            <input id="acct-limit-daily" type="number" min="0" step="0.01"
              placeholder="No limit" value="${daily}" />
            <div class="alc-hint">Max spend per day</div>
          </div>
          <div class="acct-limit-card">
            <div class="alc-title">💳 Per-Transaction</div>
            <input id="acct-limit-txn" type="number" min="0" step="0.01"
              placeholder="No limit" value="${txn}" />
            <div class="alc-hint">Max single transaction amount</div>
          </div>
        </div>

        ${mccSectionHTML('acct', acctMccBlocks)}

        <div style="display:flex;align-items:center;gap:.75rem;margin-top:1rem">
          <button class="btn btn-save btn-sm" onclick="saveAccountLimits('${accountId}')">
            Save Account Limits
          </button>
          <span id="acct-limits-alert" class="drawer-alert"></span>
        </div>
      </div>
    `;
  }

  async function saveAccountLimits(accountId) {
    const alertEl = document.getElementById('acct-limits-alert');
    alertEl.className = 'drawer-alert';

    const daily   = toCents(document.getElementById('acct-limit-daily').value);
    const monthly = toCents(document.getElementById('acct-limit-monthly').value);
    const txn     = toCents(document.getElementById('acct-limit-txn').value);

    const limits = [];
    if (daily   != null) limits.push({ limitType: 'DAILY',           valueCents: daily });
    if (monthly != null) limits.push({ limitType: 'MONTHLY',         valueCents: monthly });
    if (txn     != null) limits.push({ limitType: 'PER_TRANSACTION', valueCents: txn });
    acctMccBlocks.forEach(code => limits.push({ limitType: 'MCC_BLOCK', mccCode: code }));

    if (!limits.length) {
      alertEl.textContent = 'Enter at least one limit value or MCC block to save.';
      alertEl.className = 'drawer-alert visible error';
      return;
    }

    try {
      await apiFetch(`/accounts/${accountId}/limits`, {
        method: 'PUT',
        body: JSON.stringify({ limits }),
      });
      alertEl.textContent = '✓ Limits saved';
      alertEl.className = 'drawer-alert visible success';
      setTimeout(() => { alertEl.className = 'drawer-alert'; }, 3000);
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'drawer-alert visible error';
    }
  }

  /* ════════════════════════════════════════
     Card Tiles
  ═════════════════════════════════════════ */
  function renderCardTiles(cards, accountId) {
    const container = document.getElementById('cardsContainer');
    if (!cards.length) {
      container.innerHTML = `
        <div class="panel">
          <div class="empty">
            <div class="icon">💳</div>
            <p>No cards found for this account.</p>
          </div>
        </div>`;
      return;
    }

    const html = cards.map(card => buildCardTileHTML(card, accountId)).join('');
    container.innerHTML = `<div class="cards-grid">${html}</div>`;
  }

  function buildCardTileHTML(card, accountId) {
    const statusBadge = {
      ACTIVE:             '<span class="badge badge-active">Active</span>',
      PENDING_ACTIVATION: '<span class="badge badge-pending">Pending Activation</span>',
      INACTIVE:           '<span class="badge badge-inactive">Inactive</span>',
      SUSPENDED:          '<span class="badge badge-suspended">Suspended</span>',
      CLOSED:             '<span class="badge badge-closed">Closed</span>',
    }[card.status] ?? `<span class="badge">${card.status}</span>`;

    const lockBadge = card.isLocked
      ? '<span class="badge badge-locked">🔒 Locked</span>'
      : '<span class="badge badge-unlocked">🔓 Unlocked</span>';

    const isClosed      = card.status === 'CLOSED';
    const lockDisabled  = isClosed || card.isLocked  ? 'disabled' : '';
    const unlockDisabled= isClosed || !card.isLocked ? 'disabled' : '';

    /* Build limits drawer — virtual cards show monthly prominently */
    const isVirtual = card.type === 'VIRTUAL';
    const monthlyHighlight = isVirtual ? `
      <div class="limit-highlight">
        <div class="highlight-title">📅 Monthly Spend Cap (virtual card)</div>
        <div class="limit-row">
          <label>Monthly limit</label>
          <input id="climit-monthly-${card.id}" type="number" min="0" step="0.01" placeholder="No limit" />
          <span class="limit-unit">USD</span>
        </div>
      </div>` : '';

    const monthlyRowIfPhysical = !isVirtual ? `
      <div class="limit-row">
        <label>Monthly</label>
        <input id="climit-monthly-${card.id}" type="number" min="0" step="0.01" placeholder="No limit" />
        <span class="limit-unit">USD</span>
      </div>` : '';

    return `
      <div class="card-tile ${card.isLocked ? 'locked' : ''}" id="tile-${card.id}">
        <div class="tile-header">
          <span class="network">${card.network}</span>
          <span class="type-badge ${card.type.toLowerCase()}">${card.type}</span>
        </div>
        <div class="masked-pan">${card.maskedPan}</div>
        <div class="expiry">Expires ${String(card.expiryMonth).padStart(2,'0')} / ${card.expiryYear}</div>
        <div class="status-row">${statusBadge}${lockBadge}</div>
        <div class="tile-actions">
          ${card.status === 'PENDING_ACTIVATION' ? `<button class="btn btn-sm btn-accent" onclick="cardAction('${card.id}', 'activate', '${accountId}')">✓ Activate</button>` : ''}
          <button class="btn btn-sm btn-lock"   ${lockDisabled}   onclick="cardAction('${card.id}', 'lock',   '${accountId}')">🔒 Lock</button>
          <button class="btn btn-sm btn-unlock" ${unlockDisabled} onclick="cardAction('${card.id}', 'unlock', '${accountId}')">🔓 Unlock</button>
          ${!isClosed ? `<button class="btn btn-sm btn-limits" onclick="toggleCardLimits('${card.id}')">⚙ Limits</button>` : ''}
        </div>

        <!-- Limits drawer -->
        <div class="limits-drawer" id="limits-drawer-${card.id}">
          <h4>Card Spending Limits</h4>
          ${monthlyHighlight}
          ${monthlyRowIfPhysical}
          <div class="limit-row">
            <label>Daily</label>
            <input id="climit-daily-${card.id}" type="number" min="0" step="0.01" placeholder="No limit" />
            <span class="limit-unit">USD</span>
          </div>
          <div class="limit-row">
            <label>Per transaction</label>
            <input id="climit-txn-${card.id}" type="number" min="0" step="0.01" placeholder="No limit" />
            <span class="limit-unit">USD</span>
          </div>
          <div id="mcc-section-${card.id}"><!-- MCC section injected on open --></div>
          <div class="drawer-actions">
            <button class="btn btn-save btn-sm" onclick="saveCardLimits('${card.id}')">Save Limits</button>
            <span id="card-limits-alert-${card.id}" class="drawer-alert"></span>
          </div>
        </div>

        <div id="tile-alert-${card.id}" class="alert" style="margin-top:.6rem;padding:.5rem .75rem;font-size:.8rem"></div>
      </div>`;
  }

  async function toggleCardLimits(cardId) {
    const drawer = document.getElementById(`limits-drawer-${cardId}`);
    const isOpen = drawer.classList.contains('open');
    if (isOpen) {
      drawer.classList.remove('open');
      return;
    }
    drawer.classList.add('open');
    /* Load existing limits once drawer is opened */
    try {
      const result = await apiFetch(`/cards/${cardId}/limits`);
      const limits = result.data ?? [];
      const byType = {};
      cardMccBlocksMap[cardId] = new Set();
      limits.forEach(l => {
        if (l.limitType === 'MCC_BLOCK' && l.mccCode) cardMccBlocksMap[cardId].add(l.mccCode);
        else byType[l.limitType] = l.valueCents;
      });

      const daily   = document.getElementById(`climit-daily-${cardId}`);
      const monthly = document.getElementById(`climit-monthly-${cardId}`);
      const txn     = document.getElementById(`climit-txn-${cardId}`);

      if (daily)   daily.value   = toDollars(byType['DAILY']);
      if (monthly) monthly.value = toDollars(byType['MONTHLY']);
      if (txn)     txn.value     = toDollars(byType['PER_TRANSACTION']);

      /* Inject MCC section */
      document.getElementById(`mcc-section-${cardId}`).innerHTML =
        mccSectionHTML(cardId, cardMccBlocksMap[cardId]);
    } catch (_) {
      /* silently ignore — fields will be empty (no limits set) */
      cardMccBlocksMap[cardId] = new Set();
      document.getElementById(`mcc-section-${cardId}`).innerHTML =
        mccSectionHTML(cardId, cardMccBlocksMap[cardId]);
    }
  }

  async function saveCardLimits(cardId) {
    const alertEl = document.getElementById(`card-limits-alert-${cardId}`);
    alertEl.className = 'drawer-alert';

    const dailyEl   = document.getElementById(`climit-daily-${cardId}`);
    const monthlyEl = document.getElementById(`climit-monthly-${cardId}`);
    const txnEl     = document.getElementById(`climit-txn-${cardId}`);

    const daily   = toCents(dailyEl?.value);
    const monthly = toCents(monthlyEl?.value);
    const txn     = toCents(txnEl?.value);

    const limits = [];
    if (daily   != null) limits.push({ limitType: 'DAILY',           valueCents: daily });
    if (monthly != null) limits.push({ limitType: 'MONTHLY',         valueCents: monthly });
    if (txn     != null) limits.push({ limitType: 'PER_TRANSACTION', valueCents: txn });
    (cardMccBlocksMap[cardId] ?? []).forEach(code =>
      limits.push({ limitType: 'MCC_BLOCK', mccCode: code })
    );

    if (!limits.length) {
      alertEl.textContent = 'Enter at least one limit or MCC block to save.';
      alertEl.className = 'drawer-alert visible error';
      return;
    }

    try {
      await apiFetch(`/cards/${cardId}/limits`, {
        method: 'PUT',
        body: JSON.stringify({ limits }),
      });
      alertEl.textContent = '✓ Card limits saved';
      alertEl.className = 'drawer-alert visible success';
      setTimeout(() => { alertEl.className = 'drawer-alert'; }, 3000);
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'drawer-alert visible error';
    }
  }

  async function cardAction(cardId, action, accountId) {
    const tile    = document.getElementById(`tile-${cardId}`);
    const btns    = tile.querySelectorAll('button');
    const alertEl = document.getElementById(`tile-alert-${cardId}`);

    btns.forEach(b => b.disabled = true);
    alertEl.className = 'alert';
    alertEl.textContent = '';

    try {
      await apiFetch(`/cards/${cardId}/${action}`, { method: 'POST', body: '{}' });
      await loadCards();
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'alert alert-error visible';
      btns.forEach(b => b.disabled = false);
    }
  }

  /* ════════════════════════════════════════
     Alert helpers
  ═════════════════════════════════════════ */
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert alert-${type} visible`;
  }
  function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
  }
</script>
